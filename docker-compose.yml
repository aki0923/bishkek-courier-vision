version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: bcv_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: bishkek_courier
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: courierapp
      MYSQL_PASSWORD: courierpass123
    ports:
      - "3306:3306"
    volumes:
      - ./docker/mysql/data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    networks:
      - courier_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bcv_backend
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./logs/backend:/var/log/apache2
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_NAME: bishkek_courier
      DB_USER: courierapp
      DB_PASSWORD: courierpass123
      AI_SERVICE_URL: http://ai_service:5000
    networks:
      - courier_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ai_service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: bcv_ai
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./ai-service:/app
      - ./logs/ai:/app/logs
    environment:
      FLASK_APP: app.py
      FLASK_ENV: development
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    networks:
      - courier_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/ai/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: bcv_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - backend
      - ai_service
    networks:
      - courier_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  courier_network:
    driver: bridge

volumes:
  mysql_data: