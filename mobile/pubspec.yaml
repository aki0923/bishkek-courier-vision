name: bishkek_courier_vision
description: Last 100 meters navigation for couriers in Bishkek
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  
  # Maps (интерактивная карта)
  flutter_map: ^6.1.0  # OpenStreetMap - бесплатно
  latlong2: ^0.9.0
  
  # State Management
  provider: ^6.1.1
  
  # HTTP & API
  http: ^1.1.0
  dio: ^5.4.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Image
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  
  # Location
  geolocator: ^10.1.0
  permission_handler: ^11.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/